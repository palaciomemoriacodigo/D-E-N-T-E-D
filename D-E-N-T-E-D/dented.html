<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DENTED · Performance SSC/TK</title>
<style>
  :root{
    --bg:#0e0f13; --panel:#171922; --panel2:#1f2230; --line:#2a2e3e;
    --txt:#e6e8ef; --dim:#9aa0b4; --gold:#e5cc80; --accent:#6ea8fe;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:"Segoe UI",Roboto,system-ui,sans-serif;font-size:15px}
  a{color:var(--accent)}
  header{padding:18px 20px;border-bottom:1px solid var(--line);
         background:linear-gradient(180deg,#15171f,#0e0f13)}
  header h1{margin:0;font-size:22px;letter-spacing:.5px}
  header h1 b{color:var(--gold)}
  .sub{color:var(--dim);font-size:13px;margin-top:4px}
  .stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;
        padding:8px 14px;min-width:96px}
  .stat .v{font-size:20px;font-weight:700}
  .stat .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;
            padding:14px 20px;position:sticky;top:0;background:var(--bg);
            border-bottom:1px solid var(--line);z-index:5}
  input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
               border-radius:8px;padding:8px 10px;font-size:14px}
  input#q{flex:1;min-width:160px}
  .roles{display:flex;gap:4px}
  .roles button{background:var(--panel2);color:var(--dim);border:1px solid var(--line);
                border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px}
  .roles button.on{background:var(--accent);color:#0b0d12;border-color:var(--accent);font-weight:600}

  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
        gap:12px;padding:18px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-left:4px solid #555;
        border-radius:12px;padding:12px 14px;cursor:pointer;transition:.12s;
        display:flex;align-items:center;gap:12px}
  .card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .card .who{flex:1;min-width:0}
  .card .nm{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .meta{color:var(--dim);font-size:12px}
  .badge{font-weight:800;font-size:18px;width:46px;height:46px;border-radius:50%;
         display:flex;align-items:center;justify-content:center;color:#0b0d12;flex-shrink:0}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
           align-items:flex-start;justify-content:center;padding:20px;overflow:hidden;z-index:20}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
         width:100%;max-width:720px;padding:0;overflow-y:auto;overflow-x:hidden;
         max-height:calc(100vh - 40px)}
  .mtop{position:sticky;top:0;z-index:6;background:var(--panel)}
  .mhead{position:relative;padding:18px 20px;border-bottom:1px solid var(--line);display:flex;
         align-items:center;gap:16px;background:var(--panel2)}
  .mhead .nm{font-size:24px;font-weight:800}
  .mhead .meta{color:var(--dim);font-size:13px;margin-top:2px}
  .mhead .badge{width:60px;height:60px;font-size:24px;margin-left:auto}
  .x{position:absolute;top:24px;right:28px;font-size:26px;color:var(--dim);
     cursor:pointer;line-height:1}
  .mbody{padding:18px 20px}
  .fnav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel)}
  .fnav span{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:4px 10px;
             font-size:11px;cursor:pointer;color:var(--dim);white-space:nowrap;user-select:none}
  .fnav span:hover{color:var(--txt);border-color:var(--accent)}
  .sec{border-top:1px solid var(--line)}
  .sec:first-child{border-top:none}
  .sec-h{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);
         padding:13px 0;cursor:pointer;display:flex;align-items:center;
         justify-content:space-between;gap:10px;user-select:none}
  .sec-h:hover{color:var(--txt)}
  .sec .caret{font-size:10px;transition:transform .15s;opacity:.6;flex-shrink:0}
  .sec.open>.sec-h .caret{transform:rotate(90deg)}
  .sec-body{display:none;padding-bottom:14px}
  .sec.open>.sec-body{display:block}
  .zwrap{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:560px){.zwrap{grid-template-columns:1fr}}
  .ztag{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.5px}
  .boss{display:flex;align-items:center;gap:8px;margin:5px 0}
  .boss .bn{font-size:12px;width:84px;flex-shrink:0;color:var(--dim);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .boss .track{flex:1;height:14px;background:#0c0d12;border-radius:7px;overflow:hidden}
  .boss .fill{display:block;height:100%;border-radius:7px}
  .boss .bp{width:26px;text-align:right;font-weight:700;font-size:13px}
  .boss .bavg{width:62px;text-align:right;font-size:11px;color:var(--dim);flex-shrink:0}
  .trend{display:flex;gap:6px;flex-wrap:wrap}
  .trend .t{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
            padding:6px 10px;font-size:12px}
  .trend .t b{font-size:15px}
  .prep{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;
        padding:6px 12px;font-size:13px}
  .chip.ok{border-color:#2e7d4f;color:#7ee0a6}
  .chip.bad{border-color:#7d3a2e;color:#e6a07e}
  details{margin-top:8px}
  summary{cursor:pointer;color:var(--dim);font-size:13px}
  .gi{font-size:12px;color:var(--dim);padding:3px 0;border-bottom:1px solid var(--line)}
  .imp{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
       padding:10px 14px;margin:6px 0;font-size:14px}
  .guide{max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:4px 0;margin-top:6px}
  .gcast{display:flex;gap:10px;padding:3px 12px;font-size:12px;border-bottom:1px solid var(--line)}
  .gcast:last-child{border-bottom:none}
  .gt{width:46px;text-align:right;color:var(--gold);flex-shrink:0;font-weight:600}
  .ga{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legend{display:flex;gap:10px;flex-wrap:wrap;padding:10px 20px;color:var(--dim);
          font-size:11px;border-top:1px solid var(--line)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px}
  #overview{padding:4px 20px 0}
  .ovtitle{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:12px 0 8px}
  .ovgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
  .ovrec{background:var(--panel);border:1px solid var(--line);border-radius:10px;
         padding:7px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
  .ovrec:hover{border-color:var(--accent)}
  .ovrec .ovboss{font-size:11px;color:var(--dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ovrec .ovhold{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:74px}
  .ovrec .ovbest{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
                 justify-content:center;color:#0b0d12;font-weight:800;font-size:12px;flex-shrink:0}
  .empty{color:var(--dim);font-size:13px;font-style:italic}
</style>

  ["Jugadores", DATA.guild.n_players],
  ["Raids guild", DATA.guild.n_raids],
  ["Perf media (all-time)", DATA.guild.avg_parse ?? "—"],
].map(([l,v])=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");

// ---- leyenda de colores
document.getElementById("legend").innerHTML =
  [["≥95","#ff8000"],["75-94","#a335ee"],["50-74","#0070dd"],["25-49","#1eff00"],["<25","#9d9d9d"]]
  .map(([t,c])=>`<span><i style="background:${c}"></i>${t}</span>`).join("");

// ---- panel resumen de la guild (récords por boss + bosses flojos)
(function(){
  const ov = DATA.overview; if(!ov) return;
  const recs = DATA.bosses.SSC.concat(DATA.bosses.TK).filter(b=>ov.records[b]).map(b=>{
    const r=ov.records[b];
    return `<div class="ovrec" data-n="${encodeURIComponent(r.name)}">
      <span class="ovboss" title="${b}">${b}</span>
      <span class="ovhold" style="color:${classColor(r.class)}">${r.name}</span>
      <span class="ovbest" style="background:${parseColor(r.best)}">${r.best}</span>
    </div>`;
  }).join("");
  const lvl = ov.bossLevel.map(x=>`<div class="boss">
      <span class="bn" title="${x.boss}">${x.boss}</span>
      <span class="track"><span class="fill" style="width:${Math.min(100,x.avg)}%;background:${parseColor(x.avg)}"></span></span>
      <span class="bp" style="color:${parseColor(x.avg)}">${x.avg}</span>
    </div>`).join("");

  let dbfHtml = "";
  const dbf = ov.debuffs;
  if(dbf && dbf.table && dbf.table.length){
    const uc = u => u==null?"#666":u>=95?"#7ee0a6":u>=90?"#e5cc80":"#e6a07e";
    const cols = g => `<span style="width:120px;text-align:right;color:var(--dim);font-size:10px">${g}</span>`;
    const head = `<div class="ovrec" style="cursor:default;background:transparent;border:none;padding:2px 10px">
      <span class="ovboss" style="flex:1"></span>${dbf.groups.map(cols).join("")}</div>`;
    const rows = dbf.table.map(r=>`<div class="ovrec" style="cursor:default">
        <span class="ovboss" style="flex:1" title="${r.boss}">${r.boss}</span>
        ${dbf.groups.map(g=>`<span style="width:120px;text-align:right;font-weight:700;font-size:12px;color:${uc(r[g])}">${r[g]==null?"—":r[g]+"%"}</span>`).join("")}
      </div>`).join("");
    dbfHtml = `<div class="ovtitle">⏱️ Debuffs clave de raid (uptime medio · multiplican el daño de todos)</div>
      ${head}<div class="ovgrid" style="grid-template-columns:1fr">${rows}</div>
      <div style="font-size:11px;color:var(--dim);margin-top:6px">Es a nivel de raid (WCL no lo da por jugador). Algún bajón es mecánica (fases con adds/sumergido); la armadura pesa más cuanto más daño físico tengáis.</div>`;
  }

  document.getElementById("overview").innerHTML =
    `<div class="ovtitle">🏆 Récords — el mejor de SIEMPRE en cada boss</div>
     <div class="ovgrid">${recs}</div>
     <div class="ovtitle">📊 Nivel de la guild por boss (media de vuestro mejor de siempre)</div>
     <div style="max-width:560px">${lvl}</div>
     ${dbfHtml}`;
  document.querySelectorAll(".ovrec").forEach(c=>
    c.onclick=()=>openModal(decodeURIComponent(c.dataset.n)));
})();

// ---- filtros: clases y roles
const classes = ["All", ...Array.from(new Set(DATA.players.map(p=>p.class))).sort()];
document.getElementById("cls").innerHTML =
  classes.map(c=>`<option value="${c}">${c==="All"?"Todas las clases":c}</option>`).join("");
const roles = ["All","Tank","Healer","DPS"];
document.getElementById("roles").innerHTML =
  roles.map(r=>`<button data-r="${r}" class="${r==="All"?"on":""}">${r==="All"?"Todos":r}</button>`).join("");

// ---- render del grid
function render(){
  let list = DATA.players.filter(p=>{
    if(state.cls!=="All" && p.class!==state.cls) return false;
    if(state.role!=="All" && p.role!==state.role) return false;
    if(state.q && !p.name.toLowerCase().includes(state.q)) return false;
    return true;
  });
  const hv = p => (p.alltime&&p.alltime.perf!=null)?p.alltime.perf:(p.overall??-1);
  if(state.sort==="name") list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(state.sort==="parseA") list.sort((a,b)=>hv(a)-hv(b));
  else list.sort((a,b)=>hv(b)-hv(a));

  document.getElementById("grid").innerHTML = list.map((p,i)=>{
    const h=hv(p);
    const col=classColor(p.class), pc=parseColor(h);
    return `<div class="card" style="border-left-color:${col}" data-n="${encodeURIComponent(p.name)}">
      <div class="who">
        <div class="nm" style="color:${col}">${p.name}</div>
        <div class="meta">${p.spec||""} ${p.role} · ${p.alltime?p.alltime.raids:p.raids} raids</div>
      </div>
      <div class="badge" style="background:${pc}">${h==null?"—":Math.round(h)}</div>
    </div>`;
  }).join("") || `<div class="empty">Sin jugadores con esos filtros.</div>`;

  document.querySelectorAll(".card").forEach(c=>
    c.onclick=()=>openModal(decodeURIComponent(c.dataset.n)));
}

// ---- ficha (modal)
function worldBlock(p){
  if(!p.alltime) return '<div class="empty">Sin histórico.</div>';
  const all = DATA.bosses.SSC.concat(DATA.bosses.TK);
  const rows = all.map(b=>[b,p.alltime.by_boss[b]]).filter(x=>x[1] && x[1].amount!=null && x[1].top_median);
  if(!rows.length) return '<div class="empty">Sin benchmark mundial para esta clase/spec.</div>';
  return rows.map(([b,d])=>{
    const my=Math.round(d.amount), pct = Math.round(d.amount/d.top_median*100);
    const col = pct>=100?"#e5cc80":pct>=90?"#a335ee":pct>=75?"#0070dd":"#1eff00";
    return `<div class="boss">
      <span class="bn" title="${b}">${b}</span>
      <span class="track"><span class="fill" style="width:${Math.min(100,pct)}%;background:${col}"></span></span>
      <span class="bp" style="color:${col}">${pct}%</span>
      <span class="bavg" title="tu mejor de siempre / mediana top-100">${my}/${d.top_median}</span>
    </div>`;
  }).join("");
}
function prepBlock(prep){
  if(!prep) return `<div class="empty">Sin datos de preparación (no estuvo en los raids con Excel).</div>`;
  const cls=(v)=>v==null?"":(v>=0.8?"ok":"bad");
  let chips = `<div class="chip">Preparación: <b>${prep.score==null?"—":prep.score+"%"}</b></div>
    <div class="chip ${cls(prep.flask)}">🧪 Flask/elixir ${pct(prep.flask)}</div>
    <div class="chip ${cls(prep.food)}">🍖 Comida ${pct(prep.food)}</div>
    <div class="chip ${prep.gear_count>0?"bad":"ok"}">🔧 Gear: ${prep.gear_count} problema(s)</div>`;
  let det = prep.gear_count>0
    ? `<details><summary>Ver problemas de equipo (${prep.raid_label||""})</summary>
        ${prep.gear_issues.map(g=>`<div class="gi">${g}</div>`).join("")}</details>` : "";
  return `<div class="prep">${chips}</div>${det}`;
}
function trashChips(p){
  if(!p.trash) return '<span class="empty">Sin datos de trash.</span>';
  const t=p.trash;
  return `<div class="chip">🗑️ ${t.value.toLocaleString()} ${t.metric.toUpperCase()} de media en trash</div>
    <div class="chip">#${t.rank} de ${t.of} ${p.role}</div>`;
}
function altimeRow(boss,d){
  const col=parseColor(d.best), w=d.best==null?0:d.best;
  return `<div class="boss">
    <span class="bn" title="${boss}">${boss}</span>
    <span class="track"><span class="fill" style="width:${w}%;background:${col}"></span></span>
    <span class="bp" style="color:${col}">${d.best==null?"—":Math.round(d.best)}</span>
    <span class="bavg" title="nº de kills">×${d.kills}</span>
  </div>`;
}
function altimeBlock(p){
  const a=p.alltime;
  if(!a) return '<div class="empty">Sin histórico disponible.</div>';
  const chips=`<div class="chip">📜 <b>${a.raids}</b> raids totales</div>
    <div class="chip">Performance all-time: <b style="color:${parseColor(a.perf)}">${a.perf==null?"—":Math.round(a.perf)}</b></div>
    <div class="chip">Mejor: ${a.best_boss} (<b style="color:${parseColor(a.best_parse)}">${a.best_parse==null?"—":Math.round(a.best_parse)}</b>)</div>`;
  const rows=DATA.bosses.SSC.concat(DATA.bosses.TK).filter(b=>a.by_boss[b]).map(b=>altimeRow(b,a.by_boss[b])).join("");
  return `<div class="prep">${chips}</div>
    <div style="margin-top:10px">${rows}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:6px">Tu MEJOR parse de siempre por boss, contando TODAS tus raids (esta guild, otras guilds y pugs). ×N = nº de kills.</div>`;
}
function abRow(a){
  return `<div class="boss">
    <span class="bn" title="${a.ability}">${a.ability}</span>
    <span class="track"><span class="fill" style="width:${Math.min(100,a.pct)}%;background:#6ea8fe"></span></span>
    <span class="bp">${Math.round(a.pct)}%</span>
    <span class="bavg" title="casteos por minuto">${a.cpm!=null?Math.round(a.cpm)+"/m":""}</span>
  </div>`;
}
let _curAbility=null;
function abCompare(c){
  return `<div class="zwrap">
    <div><div class="ztag">TÚ</div>${c.mine.map(abRow).join("")}</div>
    <div><div class="ztag">#1 MUNDIAL${c.who?` · ${c.who}`:""}</div>${c.top.map(abRow).join("")}</div>
  </div>${c.tips.length?`<div style="margin-top:8px">${c.tips.map(t=>`<div class="imp">💡 ${t}</div>`).join("")}</div>`:""}`;
}
function renderAb(boss){
  if(_curAbility && _curAbility.byBoss[boss])
    document.getElementById("abCmp").innerHTML = abCompare(_curAbility.byBoss[boss]);
}
function abilityBlock(p){
  const a=p.ability;
  if(!a) return '<div class="empty">Sin datos de rotación para esta clase/spec.</div>';
  const bosses=DATA.bosses.SSC.concat(DATA.bosses.TK).filter(b=>a.byBoss[b]);
  const opts=bosses.map(b=>`<option value="${b}"${b===a.default?" selected":""}>${b}</option>`).join("");
  return `<div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--dim)">Boss:</span>
      <select onchange="renderAb(this.value)">${opts}</select>
    </div>
    <div id="abCmp" style="margin-top:10px">${abCompare(a.byBoss[a.default])}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:6px">⚠️ Datos de tu <b>mejor kill</b> (tu parse más alto) en ese boss — puede diferir de tu juego habitual. Barra y % = reparto de daño/cura · nº de la derecha = <b>casteos/min</b>.</div>`;
}
let _curGuideP=null;
function dangerBlock(boss){
  const d=DATA.dangers[boss];
  if(!d) return "";
  const mx=d.dmg.length?d.dmg[0].v:1;
  const dmg=d.dmg.map(x=>`<div class="boss">
    <span class="bn" title="${x.a}">${x.a}</span>
    <span class="track"><span class="fill" style="width:${Math.round(100*x.v/mx)}%;background:#e6705e"></span></span>
  </div>`).join("");
  const deaths=d.deaths.length
    ? d.deaths.map(x=>`<div class="chip" style="border-color:#7d3a2e">${x.a} <b style="color:#e6a07e">×${x.n}</b></div>`).join("")
    : '<span class="empty">Sin muertes registradas 🎉</span>';
  return `<div class="ztag" style="color:#e6a07e;margin-top:16px">⚠️ PELIGROS DE ESTE BOSS (de vuestras raids)</div>
    <div style="font-size:11px;color:var(--dim);margin:2px 0 5px">💥 Lo que más daño os hace (evitar/mitigar):</div>${dmg}
    <div style="font-size:11px;color:var(--dim);margin:10px 0 5px">💀 <b>${d.nDeaths}</b> muertes · causas más comunes:</div>
    <div class="prep">${deaths}</div>`;
}
function guideBlock(boss, p){
  const enc=DATA.enc[boss];
  const metric=(p.role==="Healer")?"hps":"dps";
  const g=DATA.guides[`${enc}|${p.class}|${p.spec}|${metric}`];
  let rot;
  if(!g||!g.casts||!g.casts.length){
    rot='<div class="empty">Sin guía de rotación para esta clase/spec en este boss.</div>';
  }else{
    const rows=g.casts.map(c=>`<div class="gcast"><span class="gt">${c[0].toFixed(1)}s</span><span class="ga">${DATA.gabils[c[1]]}</span></div>`).join("");
    rot=`<div style="font-size:11px;color:var(--dim);margin-bottom:4px">🎯 Rotación del #1 mundial: <b>${g.top}</b> · pelea de ${Math.round(g.dur)}s · ${g.casts.length} casteos</div>
      <div class="guide">${rows}</div>`;
  }
  return rot + dangerBlock(boss);
}
function renderGuide(boss){ if(_curGuideP) document.getElementById("gBody").innerHTML=guideBlock(boss,_curGuideP); }
function guideSection(p){
  const bosses=DATA.bosses.SSC.concat(DATA.bosses.TK);
  const def=(p.ability&&p.ability.default)||bosses[0];
  const opts=bosses.map(b=>`<option value="${b}"${b===def?" selected":""}>${b}</option>`).join("");
  return `<div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--dim)">Boss:</span>
      <select onchange="renderGuide(this.value)">${opts}</select>
    </div>
    <div id="gBody" style="margin-top:6px">${guideBlock(def,p)}</div>`;
}
function navTo(kw){
  const sec=[...document.querySelectorAll("#modal .sec")].find(s=>s.querySelector(".sec-h").textContent.includes(kw));
  if(!sec) return;
  sec.classList.add("open");
  const modal=sec.closest(".modal"), mtop=modal.querySelector(".mtop");
  const off=(mtop?mtop.offsetHeight:0)+8;
  const delta=sec.getBoundingClientRect().top - modal.getBoundingClientRect().top;
  modal.scrollTo({top: modal.scrollTop + delta - off, behavior:"smooth"});
}
function section(title, body, open){
  return `<div class="sec${open?" open":""}">
    <div class="sec-h">${title}<span class="caret">▸</span></div>
    <div class="sec-body">${body}</div></div>`;
}
function openModal(name){
  const p=DATA.players.find(x=>x.name===name); if(!p) return;
  const head=(p.alltime&&p.alltime.perf!=null)?p.alltime.perf:p.overall;
  const col=classColor(p.class), pc=parseColor(head);
  const wm=(Object.values(p.parses).find(d=>d.metric)||{}).metric||"";
  _curAbility=p.ability; _curGuideP=p;

  const trendBody=`<div class="trend">${
      p.trend.length? p.trend.map(t=>`<div class="t" title="${t.title}"><b style="color:${parseColor(t.avg)}">${t.avg==null?"—":Math.round(t.avg)}</b></div>`).join("")
      : '<span class="empty">Sin datos.</span>'}</div>`;
  const improveBody=p.improve.length? p.improve.map(i=>`<div class="imp">${i}</div>`).join("")
      : '<div class="empty">¡Nada destacable, gran trabajo!</div>';

  document.getElementById("modal").innerHTML = `
    <div class="mtop">
    <div class="mhead">
      <div>
        <div class="nm" style="color:${col}">${p.name}</div>
        <div class="meta">${p.spec||""} ${p.class} · ${p.role} · <b>${p.alltime?p.alltime.raids:p.raids} raids</b>${p.alltime?` (${p.raids} con la guild)`:""} · perf ${head==null?"—":Math.round(head)}</div>
      </div>
      <div class="badge" style="background:${pc}" title="performance all-time (todas tus raids)">${head==null?"—":Math.round(head)}</div>
      <span class="x" onclick="closeModal()">✕</span>
    </div>
      <div class="fnav">${[
        ["🎯 Mejorar","Top a mejorar"],["📊 Parses","Parses por boss"],["🌍 Mundo","Vs Top mundial"],
        ["🔬 Rotación","Rotación por boss"],["📖 Guía","Guía del boss"],["📈 Evolución","Evolución"],
        ["🗑️ Trash","Trash"],["🧪 Prep","Preparación"]
      ].map(([l,kw])=>`<span onclick="navTo('${kw}')">${l}</span>`).join("")}</div>
    </div>
    <div class="mbody">
      ${section("🎯 Top a mejorar", improveBody, true)}
      ${section("📊 Parses por boss — todas tus raids", altimeBlock(p), true)}
      ${section(`🌍 Vs Top mundial${wm?` — ${wm.toUpperCase()}`:""}`, worldBlock(p), false)}
      ${section(`🔬 Rotación por boss vs el #1 mundial${p.spec?` (${p.spec})`:""}`, abilityBlock(p), false)}
      ${section("📖 Guía del boss — rotación del #1 + peligros", guideSection(p), false)}
      ${section("📈 Evolución por raid", trendBody, false)}
      ${section("🗑️ Trash", `<div class="prep">${trashChips(p)}</div>`, false)}
      ${section("🧪 Preparación", prepBlock(p.prep), false)}
    </div>`;
  document.getElementById("overlay").classList.add("show");
  document.querySelectorAll("#modal .sec-h").forEach(h=>
    h.onclick=()=>h.parentElement.classList.toggle("open"));
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }
document.getElementById("overlay").onclick=(e)=>{ if(e.target.id==="overlay") closeModal(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// ---- eventos de filtros
document.getElementById("q").oninput=(e)=>{ state.q=e.target.value.toLowerCase().trim(); render(); };
document.getElementById("cls").onchange=(e)=>{ state.cls=e.target.value; render(); };
document.getElementById("sort").onchange=(e)=>{ state.sort=e.target.value; render(); };
document.getElementById("roles").onclick=(e)=>{
  if(e.target.tagName!=="BUTTON") return;
  state.role=e.target.dataset.r;
  document.querySelectorAll("#roles button").forEach(b=>b.classList.toggle("on",b===e.target));
  render();
};

render();
</script>
</body>
</html>
